<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Stay Hotel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
  color:white;
}

h1,h2{text-align:center;color:#ffd700;}

section{padding:40px;}

.card{
  background:#1e2a38;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
  padding:8px 15px;
  background:#ffd700;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

#bill{
  background:#000;
  padding:20px;
}
</style>
</head>

<body>

<h1>🏨 Royal Stay Hotel</h1>

<!-- ROOMS -->
<section>
<h2>Rooms</h2>
<div id="rooms" class="grid"></div>
</section>

<!-- FOOD -->
<section>
<h2>Food Menu</h2>

<div>
<button onclick="showFood('breakfast')">Breakfast</button>
<button onclick="showFood('lunch')">Lunch</button>
<button onclick="showFood('dinner')">Dinner</button>
<button onclick="showFood('dessert')">Dessert</button>
</div>

<div id="food" class="grid"></div>
</section>

<!-- BILL -->
<section id="bill">
<h2>Bill Summary</h2>
<div id="billItems">No items selected</div>
<h3 id="total">Total: ₹0</h3>
</section>

<!-- BOOKING -->
<section>
<h2>Booking</h2>
<input type="text" id="name" placeholder="Enter Name"><br><br>
<button onclick="book()">Confirm Booking</button>
</section>

<script>

// ROOMS
const roomsData=[
{name:"Deluxe Room",price:3000},
{name:"Suite Room",price:6000},
{name:"Luxury Room",price:9000}
];

const roomsDiv=document.getElementById("rooms");

roomsData.forEach(r=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>${r.name}</h3>
<p>Price: ₹${r.price}</p>
<button onclick="addToBill('${r.name}',${r.price})">Select</button>
`;
roomsDiv.appendChild(div);
});

// FOOD
const foodData=[
{name:"Idli",price:50,type:"breakfast"},
{name:"Dosa",price:100,type:"breakfast"},
{name:"Meals",price:150,type:"lunch"},
{name:"Biryani",price:200,type:"dinner"},
{name:"Fried Rice",price:180,type:"dinner"},
{name:"Ice Cream",price:80,type:"dessert"},
{name:"Cake",price:120,type:"dessert"}
];

function showFood(type){
let foodDiv=document.getElementById("food");
foodDiv.innerHTML="";

foodData.filter(f=>f.type==type).forEach(f=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>${f.name}</h3>
<p>₹${f.price}</p>
<button onclick="addToBill('${f.name}',${f.price})">Add</button>
`;
foodDiv.appendChild(div);
});
}

// BILL
let total=0;

function addToBill(name,price){
total+=price;

let bill=document.getElementById("billItems");
bill.innerHTML+=`<p>${name} - ₹${price}</p>`;

document.getElementById("total").innerText="Total: ₹"+total;
}

// BOOKING
function book(){
let name=document.getElementById("name").value;

if(!name){
alert("Enter your name");
return;
}

alert("Booking Confirmed for "+name+" 🎉");
}

</script>

</body>
</html>
